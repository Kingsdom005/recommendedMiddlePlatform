global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'recommendation_service'
    static_configs:
    - targets: ['localhost:8080']

  - job_name: 'kafka'
    static_configs:
    - targets: ['localhost:9308']

  - job_name: 'redis'
    static_configs:
    - targets: ['localhost:9121']
